---
# ============================================================
# TODO: Change the addresses range to match your home network!
# Pick IPs outside your router's DHCP range to avoid conflicts.
# Example: if your DHCP hands out 192.168.1.100-192.168.1.200,
#          use something like 192.168.1.240-192.168.1.250
# ============================================================
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: homelab-pool
  namespace: metallb-system
spec:
  addresses:
    - 10.10.40.0-10.10.40.250
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: homelab-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - homelab-pool
