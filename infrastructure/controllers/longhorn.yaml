---
apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 24h
  url: https://charts.longhorn.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 1h
  chart:
    spec:
      chart: longhorn
      version: "1.7.x"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      interval: 12h
  values:
    defaultSettings:
      # Replicas & placement
      defaultReplicaCount: 2
      defaultDataLocality: best-effort   # schedule a local replica on the same node as the pod
      replicaAutoBalance: best-effort    # rebalance replicas when nodes are added/removed
      # Reliability
      autoSalvage: true                  # auto-recover faulted volumes
      autoDeletePodWhenVolumeDetachedUnexpectedly: true
      # Backups
      backupCompressionMethod: lz4       # fast compression for backup data
      # Snapshots
      snapshotDataIntegrity: fast-check  # periodic hash checks on snapshot data
      recurringSuccessfulJobsHistoryLimit: 3
      recurringFailedJobsHistoryLimit: 1
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2
      defaultDataLocality: best-effort
      reclaimPolicy: Retain              # keep volume data if PVC is deleted accidentally
      recurringJobSelector:
        enable: true
        jobList: '[{"name":"default","isGroup":true}]'
    ingress:
      enabled: true
      ingressClassName: nginx
      host: longhorn.kube.local.tnndev.com
